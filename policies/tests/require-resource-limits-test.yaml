name: require-resource-limits
policies:
  - ../policies/require-resource-limits.yaml
resources:
  - name: good-pod
    resource:
      apiVersion: v1
      kind: Pod
      metadata:
        name: good-pod
      spec:
        containers:
          - name: nginx
            image: nginx:1.21
            resources:
              limits:
                cpu: "100m"
                memory: "128Mi"
  - name: bad-pod
    resource:
      apiVersion: v1
      kind: Pod
      metadata:
        name: bad-pod
      spec:
        containers:
          - name: nginx
            image: nginx:1.21
results:
  - policy: require-resource-limits
    rule: limits-required
    resource: good-pod
    status: pass
  - policy: require-resource-limits
    rule: limits-required
    resource: bad-pod
    status: fail
