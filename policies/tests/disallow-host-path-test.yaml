name: disallow-host-path
policies:
  - ../policies/disallow-host-path.yaml
resources:
  - name: good-pod
    resource:
      apiVersion: v1
      kind: Pod
      metadata:
        name: good-pod
      spec:
        containers:
          - name: nginx
            image: nginx:1.21
        volumes: []
  - name: bad-pod
    resource:
      apiVersion: v1
      kind: Pod
      metadata:
        name: bad-pod
      spec:
        containers:
          - name: nginx
            image: nginx:1.21
        volumes:
          - name: host
            hostPath:
              path: /tmp
results:
  - policy: disallow-host-path
    rule: deny-host-path
    resource: good-pod
    status: pass
  - policy: disallow-host-path
    rule: deny-host-path
    resource: bad-pod
    status: fail
