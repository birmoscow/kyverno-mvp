name: disallow-nodeport
policies:
  - ../policies/disallow-nodeport.yaml
resources:
  - name: good-svc
    resource:
      apiVersion: v1
      kind: Service
      metadata:
        name: good-svc
      spec:
        type: ClusterIP
        ports:
          - port: 80
  - name: bad-svc
    resource:
      apiVersion: v1
      kind: Service
      metadata:
        name: bad-svc
      spec:
        type: NodePort
        ports:
          - port: 80
            nodePort: 30080
results:
  - policy: disallow-nodeport
    rule: nodeport-forbidden
    resource: good-svc
    status: pass
  - policy: disallow-nodeport
    rule: nodeport-forbidden
    resource: bad-svc
    status: fail
