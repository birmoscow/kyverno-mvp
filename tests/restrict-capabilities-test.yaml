name: restrict-capabilities
policies:
  - ../policies/restrict-capabilities.yaml
resources:
  - restrict-capabilities-resources.yaml
results:
  - policy: restrict-capabilities
    rule: drop-all-capabilities
    resource: good-pod
    kind: Pod
    result: pass
  - policy: restrict-capabilities
    rule: drop-all-capabilities
    resource: bad-pod
    kind: Pod
    result: fail
