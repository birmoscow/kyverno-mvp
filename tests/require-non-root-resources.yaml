apiVersion: v1
kind: Pod
metadata:
  name: good-pod
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: nginx
      image: nginx:1.21
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-pod
spec:
  securityContext:
    runAsNonRoot: false
  containers:
    - name: nginx
      image: nginx:1.21
