name: disallow-privileged
policies:
  - ../policies/disallow-privileged.yaml
resources:
  - disallow-privileged-resources.yaml
results:
  - policy: disallow-privileged
    rule: deny-privileged
    resource: good-pod
    kind: Pod
    result: pass
  - policy: disallow-privileged
    rule: deny-privileged
    resource: bad-pod
    kind: Pod
    result: fail
